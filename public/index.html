<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neuro Trend Reporter</title>
    <link rel="stylesheet" href="./assets/app.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">GitHub Actions API</p>
        <h1>Neuro Trend Reporter</h1>
      </div>
      <nav aria-label="Data endpoints">
        <a href="./data/latest.json">latest.json</a>
        <a href="./data/papers.json">papers</a>
        <a href="./data/funding.json">funding</a>
      </nav>
    </header>

    <main>
      <section class="summary" id="summary">
        <div>
          <span class="label">Generated</span>
          <strong id="generatedAt">Loading</strong>
        </div>
        <div>
          <span class="label">Compare</span>
          <strong id="compareYears">-</strong>
        </div>
        <div>
          <span class="label">Items</span>
          <strong id="itemCount">-</strong>
        </div>
      </section>

      <section class="rankings">
        <div>
          <h2>引用増加</h2>
          <div id="citationGrowth" class="list"></div>
        </div>
        <div>
          <h2>アクセス増加</h2>
          <div id="accessGrowth" class="list"></div>
        </div>
      </section>

      <section>
        <div class="sectionHead">
          <h2>探索カテゴリ</h2>
          <div class="tabs" id="tabs"></div>
        </div>
        <div id="sectionItems" class="cards"></div>
      </section>
    </main>

    <template id="itemTemplate">
      <article class="card">
        <div class="cardHeader">
          <span class="kind"></span>
          <span class="date"></span>
        </div>
        <h3><a class="title" target="_blank" rel="noreferrer"></a></h3>
        <p class="summaryText"></p>
        <div class="meta"></div>
      </article>
    </template>

    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
